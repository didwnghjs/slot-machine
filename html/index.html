<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>럭키 프루트 & 7 슬롯머신</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #050508;
            color: #ffffff;
        }
        /* 슬롯머신의 네온 효과 및 미세한 광원 연출 */
        .neon-container {
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.25), inset 0 0 20px rgba(99, 102, 241, 0.15);
        }
        /* 릴 텍스트가 회전할 때 자연스러운 트랜지션 효과 제공 */
        .reel-spin {
            transition: transform 0.08s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <main id="slotMachineContainer" class="w-full max-w-md bg-gradient-to-b from-gray-900 to-gray-950 border border-gray-800 rounded-3xl p-6 md:p-8 neon-container transition-all duration-300">
        
        <header class="flex justify-between items-center mb-6 pb-4 border-b border-gray-800">
            <div>
                <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 tracking-tight">
                    프루트 & 7 슬롯머신
                </h1>
                <p class="text-[11px] text-gray-500 mt-0.5">배팅 총 한도: 100 코인 고정</p>
            </div>
            <div class="bg-gray-950 border border-gray-850 px-4 py-2 rounded-xl text-right">
                <span class="text-[10px] text-gray-500 block font-medium">보유 코인</span>
                <span id="coinScore" class="text-lg font-black text-yellow-400">100</span>
            </div>
        </header>

        <section id="bankruptcyScreen" class="hidden text-center py-10">
            <h2 class="text-5xl font-black text-red-600 tracking-wider mb-2 animate-pulse">파산</h2>
            <p class="text-gray-400 text-sm mb-6">모든 코인을 전액 탕진하셨습니다.</p>
            <button 
                onclick="restartGame()"
                class="w-full bg-gradient-to-r from-red-600 to-pink-600 hover:from-red-700 hover:to-pink-700 text-white font-bold py-3.5 rounded-xl transition-all active:scale-95 shadow-lg shadow-red-600/10 text-sm"
            >
                다시 시작하기 🔄
            </button>
        </section>

        <div id="activePlayScreen" class="block space-y-6">
            
            <section class="text-center">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-[10px] font-bold text-gray-600 tracking-widest">SLOT DISPLAY</span>
                    <span id="statusBar" class="bg-indigo-950/60 text-indigo-400 text-[11px] font-bold px-2.5 py-0.5 rounded-md border border-indigo-900/50">
                        대기 중
                    </span>
                </div>

                <div class="bg-gray-950 border-2 border-gray-850 rounded-2xl p-5 flex justify-center gap-4 shadow-inner">
                    <div class="w-24 h-28 bg-gradient-to-b from-gray-900 to-black border border-gray-700 rounded-xl flex items-center justify-center shadow-lg overflow-hidden">
                        <span id="slotWindow1" class="reel-spin text-4xl select-none block">🍇</span>
                    </div>
                    <div class="w-24 h-28 bg-gradient-to-b from-gray-900 to-black border border-gray-700 rounded-xl flex items-center justify-center shadow-lg overflow-hidden">
                        <span id="slotWindow2" class="reel-spin text-4xl select-none block">🍓</span>
                    </div>
                    <div class="w-24 h-28 bg-gradient-to-b from-gray-900 to-black border border-gray-700 rounded-xl flex items-center justify-center shadow-lg overflow-hidden">
                        <span id="slotWindow3" class="reel-spin text-4xl select-none block">🍍</span>
                    </div>
                </div>
            </section>

            <section class="bg-gray-950 border border-gray-850 rounded-2xl p-4">
                <div class="flex justify-between items-center mb-2">
                    <label for="betValueInput" class="text-xs font-bold text-gray-400">배팅 금액 입력</label>
                    <span class="text-[10px] text-purple-400 font-semibold">보유 한도 내 조정 가능</span>
                </div>
                
                <div class="flex gap-2">
                    <input 
                        type="number" 
                        id="betValueInput" 
                        value="10"
                        min="1" 
                        max="100"
                        class="w-24 bg-gray-900 border border-gray-700 rounded-xl px-3 py-2.5 text-white text-center font-bold focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all text-sm"
                    >
                    <button onclick="modifyBetValue(5)" class="flex-1 bg-gray-900 hover:bg-gray-800 border border-gray-700 text-xs font-bold rounded-xl text-gray-300 active:scale-95 transition-all">+5</button>
                    <button onclick="modifyBetValue(10)" class="flex-1 bg-gray-900 hover:bg-gray-800 border border-gray-700 text-xs font-bold rounded-xl text-gray-300 active:scale-95 transition-all">+10</button>
                    <button onclick="modifyBetValue('MAX')" class="flex-1 bg-indigo-950/40 hover:bg-indigo-900/60 border border-indigo-800 text-xs font-black rounded-xl text-indigo-400 active:scale-95 transition-all">MAX</button>
                </div>
                
                <p id="alertPrompt" class="text-red-400 text-[11px] mt-2 hidden">
                    ⚠️ 배팅 코인이 비어있거나 올바르지 않습니다. (최대 100 코인까지 입력 가능)
                </p>
            </section>

            <button 
                id="leverSpinBtn"
                onclick="triggerSlotSpin()"
                class="w-full bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white font-extrabold py-4 rounded-xl transition-all duration-200 active:scale-98 flex items-center justify-center gap-2 text-sm shadow-md"
            >
                슬롯 핸들 당기기 🚀
            </button>

            <section id="feedbackCard" class="hidden bg-gray-950 border border-gray-850 rounded-2xl p-4 text-center transition-all">
                <h3 id="feedbackSummary" class="text-sm font-black text-white mb-1">결과 계산 대기</h3>
                <p id="feedbackDetail" class="text-xs text-gray-400">포인트를 배팅하고 스핀하면 실시간으로 정산 연산 결과가 반영됩니다.</p>
            </section>

        </div>

    </main>

    <script>
        // 전역 코인 제어 장치 및 심볼 인덱스 초기 설정 (10번 요구사항: 100 코인 고정)
        let totalAssetWallet = 100;
        const prizeSymbols = ['🍇', '🍓', '🍍', '🍎', '🍋', '7'];

        /**
         * 배팅 제어 장치 오프셋 조절 및 매핑 연산 함수
         */
        function modifyBetValue(action) {
            const betInput = document.getElementById('betValueInput');
            let baseNum = parseInt(betInput.value) || 0;

            if (action === 'MAX') {
                betInput.value = Math.min(totalAssetWallet, 100);
            } else {
                let targetNum = baseNum + action;
                if (targetNum > 100) targetNum = 100;
                if (targetNum > totalAssetWallet) targetNum = totalAssetWallet;
                betInput.value = targetNum;
            }
        }

        /**
         * 주 함수: 슬롯 컴포넌트 구동 핸들러
         */
        function triggerSlotSpin() {
            const betInput = document.getElementById('betValueInput');
            const alertPrompt = document.getElementById('alertPrompt');
            const leverSpinBtn = document.getElementById('leverSpinBtn');
            const statusBar = document.getElementById('statusBar');
            const feedbackCard = document.getElementById('feedbackCard');

            const selectedBet = parseInt(betInput.value);

            // 유효성 체크 조건식 예외 제어 (사용자 입력 검증 및 제한 사항 필터링)
            if (!selectedBet || isNaN(selectedBet) || selectedBet <= 0 || selectedBet > totalAssetWallet || selectedBet > 100) {
                alertPrompt.classList.remove('hidden');
                betInput.classList.add('border-red-500');
                return;
            }

            // 예외 텍스트 숨김 처리 및 버튼 상호작용 제한 가동
            alertPrompt.classList.add('hidden');
            betInput.classList.remove('border-red-500');
            leverSpinBtn.disabled = true;
            feedbackCard.classList.add('hidden');

            statusBar.className = "bg-yellow-950/60 text-yellow-500 text-[11px] font-bold px-2.5 py-0.5 rounded-md border border-yellow-900/50 animate-pulse";
            statusBar.innerText = "스핀 연산 중";

            // 차감 처리 및 계량 디스플레이 동기화
            totalAssetWallet -= selectedBet;
            refreshWalletUI();

            const w1 = document.getElementById('slotWindow1');
            const w2 = document.getElementById('slotWindow2');
            const w3 = document.getElementById('slotWindow3');

            let rotationTicks = 0;
            // 타이머 스케줄링을 통한 난수 대입 애니메이션 구동 효과 구현
            const spinTimer = setInterval(() => {
                rotationTicks++;
                
                w1.innerText = prizeSymbols[Math.floor(Math.random() * prizeSymbols.length)];
                w2.innerText = prizeSymbols[Math.floor(Math.random() * prizeSymbols.length)];
                w3.innerText = prizeSymbols[Math.floor(Math.random() * prizeSymbols.length)];

                // 소정의 시간 후 정지 및 당첨 조건 판단 핸들러 연계
                if (rotationTicks > 10) {
                    clearInterval(spinTimer);
                    evaluateSpinOutcome(selectedBet);
                }
            }, 80);
        }

        /**
         * 당첨 배율 알고리즘 분석 및 피드백 시각화 처리 함수
         */
        function evaluateSpinOutcome(stakedAmount) {
            const w1 = document.getElementById('slotWindow1').innerText;
            const w2 = document.getElementById('slotWindow2').innerText;
            const w3 = document.getElementById('slotWindow3').innerText;

            const leverSpinBtn = document.getElementById('leverSpinBtn');
            const statusBar = document.getElementById('statusBar');
            const feedbackCard = document.getElementById('feedbackCard');
            const feedbackSummary = document.getElementById('feedbackSummary');
            const feedbackDetail = document.getElementById('feedbackDetail');

            let revenueMultiplier = 0;
            let displayTitle = "";

            // 조건 연산 장치 판정문 분기 처리
            if (w1 === w2 && w2 === w3) {
                if (w1 === '7') {
                    revenueMultiplier = stakedAmount * 10; // 7 잭팟 최대 가중치
                    displayTitle = "🔥 트리플 잭팟 7 발생!! 🔥";
                } else {
                    revenueMultiplier = stakedAmount * 4;
                    displayTitle = "🎉 트리플 과일 일치 성공! 🎉";
                }
            } else if (w1 === w2 || w2 === w3 || w1 === w3) {
                revenueMultiplier = Math.floor(stakedAmount * 1.5);
                displayTitle = "✨ 더블 매칭 페어 획득 ✨";
            } else if (w1 === '7' || w2 === '7' || w3 === '7') {
                revenueMultiplier = Math.floor(stakedAmount * 1.0); // 7 포함 시 원금 보장형 보너스 적용
                displayTitle = "👍 행운의 single 7 세이브 👍";
            } else {
                revenueMultiplier = 0;
                displayTitle = "미당첨 낙방 조합 😢";
            }

            // 실시간 자산 지표 최종 연산 누적
            totalAssetWallet += revenueMultiplier;
            refreshWalletUI();

            // 가시적 레이아웃 보드 동적 출력 전환
            feedbackCard.classList.remove('hidden');
            if (revenueMultiplier > 0) {
                feedbackCard.className = "bg-green-950/30 border border-green-500/30 rounded-2xl p-4 text-center transition-all";
                feedbackSummary.className = "text-sm font-black text-green-400 mb-1";
                feedbackSummary.innerText = displayTitle;
                feedbackDetail.innerText = `즉시 보상 정산이 반영되어 [ +${revenueMultiplier} 코인 ]을 지급받았습니다.`;
                
                statusBar.className = "bg-green-500/10 text-green-400 text-[11px] font-bold px-2.5 py-0.5 rounded-md border border-green-500/30";
                statusBar.innerText = "정산 완료";
            } else {
                feedbackCard.className = "bg-gray-950 border border-gray-850 rounded-2xl p-4 text-center transition-all";
                feedbackSummary.className = "text-sm font-black text-gray-400 mb-1";
                feedbackSummary.innerText = displayTitle;
                feedbackDetail.innerText = `일치 조건을 충족하지 못해 [ -${stakedAmount} 코인 ]이 차감 처리되었습니다.`;
                
                statusBar.className = "bg-red-500/10 text-red-400 text-[11px] font-bold px-2.5 py-0.5 rounded-md border border-red-500/30";
                statusBar.innerText = "미당첨";
            }

            // 11번 파산 상태 검증 제어식 (자산이 0이 되면 즉시 실행 차단 및 복구 스크린 전환)
            if (totalAssetWallet <= 0) {
                activateBankruptcyMode();
                return;
            }

            // 제어 플래그 복구
            leverSpinBtn.disabled = false;
        }

        /**
         * 계량 텍스트 스코어 동기화 엔진 함수
         */
        function refreshWalletUI() {
            document.getElementById('coinScore').innerText = totalAssetWallet;
        }

        /**
         * 파산 UI 잠금 스위칭 장치 함수
         */
        function activateBankruptcyMode() {
            document.getElementById('activePlayScreen').classList.replace('block', 'hidden');
            document.getElementById('bankruptcyScreen').classList.remove('hidden');
            
            const statusBar = document.getElementById('statusBar');
            statusBar.className = "bg-red-600 text-white text-[11px] font-bold px-2.5 py-0.5 rounded-md";
            statusBar.innerText = "파산 상태";
        }

        /**
         * 초기화 및 상태 머신 초기화 회귀 함수
         */
        function restartGame() {
            totalAssetWallet = 100;
            refreshWalletUI();
            
            // 입력 폼 초깃값 원복 및 가시 스크린 스왑 제어
            document.getElementById('betValueInput').value = "10";
            document.getElementById('activePlayScreen').classList.replace('hidden', 'block');
            document.getElementById('bankruptcyScreen').classList.add('hidden');
            document.getElementById('feedbackCard').classList.add('hidden');
            
            const leverSpinBtn = document.getElementById('leverSpinBtn');
            leverSpinBtn.disabled = false;

            const statusBar = document.getElementById('statusBar');
            statusBar.className = "bg-indigo-950/60 text-indigo-400 text-[11px] font-bold px-2.5 py-0.5 rounded-md border border-indigo-900/50";
            statusBar.innerText = "대기 중";
        }
    </script>
</body>
</html>
