<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 럭키 프루트 슬롯머신</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #030305;
            color: #ffffff;
            perspective: 1200px;
            overflow-x: hidden;
        }
        .neon-glow-frame {
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.25), inset 0 0 20px rgba(236, 72, 153, 0.2);
        }
        .reel-viewport {
            perspective: 400px;
        }
        .reel-3d-box {
            transform-style: preserve-3d;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes combo-pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px #f59e0b); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px #ef4444); }
        }
        .combo-active {
            animation: combo-pulse 0.6s infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <main class="w-full max-w-md bg-gradient-to-b from-gray-900 to-black border-2 border-gray-800 rounded-3xl p-6 neon-glow-frame">
        
        <header class="flex justify-between items-start mb-6 pb-4 border-b border-gray-800/80">
            <div>
                <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-500 to-amber-400 tracking-tight">
                    3D PREMIUM FRUIT SLOT
                </h1>
                <div id="comboBadge" class="hidden mt-1 bg-gradient-to-r from-amber-500 to-red-500 text-black text-[10px] font-black px-2 py-0.5 rounded shadow-sm uppercase tracking-wider font-mono">
                    🔥 <span id="comboCount">0</span> COMBO ACTIVE
                </div>
            </div>
            
            <div class="bg-gray-950/80 border border-gray-800 px-3 py-1.5 rounded-xl text-right min-w-[80px]">
                <span class="text-[9px] text-gray-500 block font-medium tracking-tight">MY COIN</span>
                <span id="walletDisplay" class="text-base font-black text-yellow-400 font-mono">100</span>
            </div>
        </header>

        <section id="bankruptcyScreen" class="hidden text-center py-12">
            <h2 class="text-5xl font-black text-red-600 tracking-widest mb-3 animate-pulse">파산</h2>
            <p class="text-xs text-gray-400 mb-8">모든 소유 코인이 소진되었습니다.</p>
            <button 
                onclick="actionResetGame()"
                class="w-full bg-gradient-to-r from-red-600 to-pink-600 hover:from-red-700 hover:to-pink-700 text-white font-bold py-3.5 rounded-xl transition-all active:scale-95 shadow-md shadow-red-600/10 text-sm"
            >
                코인 충전 후 다시 시작하기 🔄
            </button>
        </section>

        <div id="mainDashboard" class="block space-y-6">
            
            <section class="text-center">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-[9px] font-bold text-gray-600 tracking-widest font-mono">3D REEL ROTATION</span>
                    <span id="statusIndicator" class="bg-purple-950/40 text-purple-400 text-[10px] font-bold px-2 py-0.5 rounded border border-purple-900/40 tracking-wide">
                        READY
                    </span>
                </div>

                <div class="bg-gray-950 border-2 border-gray-850 rounded-2xl p-4 flex justify-center gap-3 shadow-inner">
                    <div class="reel-viewport w-24 h-28 bg-gradient-to-b from-gray-900 to-black border border-gray-800 rounded-xl flex items-center justify-center shadow-lg overflow-hidden">
                        <span id="wheelUnit1" class="reel-3d-box text-4xl select-none block transform">🍇</span>
                    </div>
                    <div class="reel-viewport w-24 h-28 bg-gradient-to-b from-gray-900 to-black border border-gray-800 rounded-xl flex items-center justify-center shadow-lg overflow-hidden">
                        <span id="wheelUnit2" class="reel-3d-box text-4xl select-none block transform">🍎</span>
                    </div>
                    <div class="reel-viewport w-24 h-28 bg-gradient-to-b from-gray-900 to-black border border-gray-800 rounded-xl flex items-center justify-center shadow-lg overflow-hidden">
                        <span id="wheelUnit3" class="reel-3d-box text-4xl select-none block transform">🍍</span>
                    </div>
                </div>
            </section>

            <section class="bg-gray-950/80 border border-gray-850 rounded-2xl p-4">
                <div class="flex justify-between items-center mb-2">
                    <label for="betAmountField" class="text-xs font-bold text-gray-400">배팅 코인 지정</label>
                    <span class="text-[10px] text-purple-400 font-semibold font-mono">MAX 100</span>
                </div>
                
                <div class="flex gap-2">
                    <input 
                        type="number" 
                        id="betAmountField" 
                        value="10"
                        min="1" 
                        max="100"
                        class="w-20 bg-gray-900 border border-gray-700 rounded-xl px-2 py-2 text-white text-center font-bold focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all text-sm font-mono"
                    >
                    <button onclick="modifyBetWallet(5)" class="flex-1 bg-gray-900 hover:bg-gray-800 border border-gray-700 text-xs font-bold rounded-xl text-gray-300 active:scale-95 transition-all">+5</button>
                    <button onclick="modifyBetWallet(10)" class="flex-1 bg-gray-900 hover:bg-gray-800 border border-gray-700 text-xs font-bold rounded-xl text-gray-300 active:scale-95 transition-all">+10</button>
                    <button onclick="modifyBetWallet('MAX')" class="flex-1 bg-purple-950/40 hover:bg-purple-900/60 border border-purple-800 text-xs font-black rounded-xl text-purple-400 active:scale-95 transition-all font-mono">MAX</button>
                </div>
                
                <p id="errorPrompt" class="text-red-400 text-[10px] mt-2 hidden">
                    ⚠️ 입력 정보가 비어있거나 소지한 코인을 초과했습니다! (최대 100코인 한도 내 지정 필수)
                </p>
            </section>

            <button 
                id="leverActionTrigger"
                onclick="executeSlotSpin()"
                class="w-full bg-gradient-to-r from-purple-500 via-pink-500 to-amber-500 hover:brightness-110 text-white font-black py-4 rounded-xl transition-all active:scale-98 text-sm tracking-wider shadow-lg"
            >
                SPIN REELS 🎰
            </button>

            <section id="payoutReportCard" class="hidden bg-gray-950 border border-gray-850 rounded-2xl p-4 text-center transition-all">
                <h3 id="reportSummary" class="text-sm font-black text-white mb-1">결과 계산 대기</h3>
                <p id="reportDetail" class="text-xs text-gray-400">정산 연산 결과가 여기에 실시간 매핑됩니다.</p>
            </section>

        </div>

    </main>

    <script>
        const fruitSymbols = ['🍇', '🍎', '🍍', '🥭', '🍉', '🍓', '🍑'];
        const fruitNames = { '🍇': '포도', '🍎': '사과', '🍍': '파인애플', '🥭': '망고', '🍉': '수박', '🍓': '딸기', '🍑': '복숭아' };

        let walletBalance = 100;
        let consecutiveStreak = 0;

        function modifyBetWallet(action) {
            const betInput = document.getElementById('betAmountField');
            let currentBet = parseInt(betInput.value) || 0;

            if (action === 'MAX') {
                betInput.value = Math.min(walletBalance, 100);
            } else {
                let targetBet = currentBet + action;
                if (targetBet > 100) targetBet = 100;
                if (targetBet > walletBalance) targetBet = walletBalance;
                betInput.value = targetBet;
            }
            
            // 값을 변경했으므로 에러 메시지 초기화
            document.getElementById('errorPrompt').classList.add('hidden');
            betInput.classList.remove('border-red-500');
        }

        function executeSlotSpin() {
            const betInput = document.getElementById('betAmountField');
            const errorPrompt = document.getElementById('errorPrompt');
            const leverActionTrigger = document.getElementById('leverActionTrigger');
            const statusIndicator = document.getElementById('statusIndicator');
            const payoutReportCard = document.getElementById('payoutReportCard');

            let betValue = parseInt(betInput.value);

            if (!betValue || isNaN(betValue) || betValue <= 0 || betValue > walletBalance || betValue > 100) {
                errorPrompt.classList.remove('hidden');
                betInput.classList.add('border-red-500');
                return;
            }

            errorPrompt.classList.add('hidden');
            betInput.classList.remove('border-red-500');
            leverActionTrigger.disabled = true;
            payoutReportCard.classList.add('hidden');

            statusIndicator.className = "bg-amber-950/60 text-amber-500 text-[10px] font-bold px-2 py-0.5 rounded border border-amber-900/40 animate-pulse";
            statusIndicator.innerText = "SPINNING";

            walletBalance -= betValue;
            syncWalletUI();

            const w1 = document.getElementById('wheelUnit1');
            const w2 = document.getElementById('wheelUnit2');
            const w3 = document.getElementById('wheelUnit3');

            let rotationSteps = 0;
            const spinAnimation = setInterval(() => {
                rotationSteps++;
                
                w1.innerText = fruitSymbols[Math.floor(Math.random() * fruitSymbols.length)];
                w1.style.transform = `rotateX(${rotationSteps * 40}deg) translateZ(8px)`;
                
                w2.innerText = fruitSymbols[Math.floor(Math.random() * fruitSymbols.length)];
                w2.style.transform = `rotateX(${rotationSteps * -40}deg) translateZ(8px)`;
                
                w3.innerText = fruitSymbols[Math.floor(Math.random() * fruitSymbols.length)];
                w3.style.transform = `rotateX(${rotationSteps * 50}deg) translateZ(8px)`;

                if (rotationSteps > 12) {
                    clearInterval(spinAnimation);
                    w1.style.transform = "rotateX(0deg) translateZ(0px)";
                    w2.style.transform = "rotateX(0deg) translateZ(0px)";
                    w3.style.transform = "rotateX(0deg) translateZ(0px)";
                    verifyMatchOutcome(betValue);
                }
            }, 65);
        }

        function verifyMatchOutcome(betValue) {
            const w1 = document.getElementById('wheelUnit1').innerText;
            const w2 = document.getElementById('wheelUnit2').innerText;
            const w3 = document.getElementById('wheelUnit3').innerText;

            const leverActionTrigger = document.getElementById('leverActionTrigger');
            const statusIndicator = document.getElementById('statusIndicator');
            const payoutReportCard = document.getElementById('payoutReportCard');
            const reportSummary = document.getElementById('reportSummary');
            const reportDetail = document.getElementById('reportDetail');

            let multiplier = 0;
            let summaryHeadline = "";
            let triggerWinEffect = false;

            if (w1 === w2 && w2 === w3) {
                triggerWinEffect = true;
                multiplier = 8;
                summaryHeadline = `🎉 트리플 [${fruitNames[w1]}] 대박 당첨! 🎉`;
            } else if (w1 === w2 || w2 === w3 || w1 === w3) {
                triggerWinEffect = true;
                multiplier = 2;
                const matchIcon = (w1 === w2 || w1 === w3) ? w1 : w2;
                summaryHeadline = `✨ 더블 [${fruitNames[matchIcon]}] 페어 달성 ✨`;
            } else {
                triggerWinEffect = false;
                multiplier = 0;
                summaryHeadline = "미당첨 조합 😢";
            }

            let finalPayout = 0;
            if (triggerWinEffect) {
                consecutiveStreak++;
                let comboBonus = consecutiveStreak > 1 ? Math.floor(betValue * (consecutiveStreak * 0.1)) : 0;
                finalPayout = (betValue * multiplier) + comboBonus;
                walletBalance += finalPayout;
                
                triggerFireworkBlast();
                if (consecutiveStreak > 1) triggerComboScreenFlash();
            } else {
                consecutiveStreak = 0;
                finalPayout = 0;
            }

            syncWalletUI();
            refreshComboBadge();

            payoutReportCard.classList.remove('hidden');
            if (finalPayout > 0) {
                payoutReportCard.className = "bg-green-950/30 border border-green-500/30 rounded-2xl p-4 text-center transition-all";
                reportSummary.className = "text-sm font-black text-green-400 mb-1";
                reportSummary.innerText = summaryHeadline;
                
                let comboText = consecutiveStreak > 1 ? ` (콤보 보너스 +${Math.floor(betValue * (consecutiveStreak * 0.1))} 포함)` : "";
                reportDetail.innerText = `축하합니다! 총 [ +${finalPayout} 코인 ]의 당첨금이 지급되었습니다.${comboText}`;
                
                statusIndicator.className = "bg-green-500/10 text-green-400 text-[10px] font-bold px-2 py-0.5 rounded border border-green-500/30";
                statusIndicator.innerText = "WIN";
            } else {
                payoutReportCard.className = "bg-gray-950 border border-gray-850 rounded-2xl p-4 text-center transition-all";
                reportSummary.className = "text-sm font-black text-gray-500 mb-1";
                reportSummary.innerText = summaryHeadline;
                reportDetail.innerText = `일치하는 조건이 없어 배팅한 [ -${betValue} 코인 ]을 잃었습니다.`;
                
                statusIndicator.className = "bg-red-500/10 text-red-400 text-[10px] font-bold px-2 py-0.5 rounded border border-red-500/30";
                statusIndicator.innerText = "LOSE";
            }

            if (walletBalance <= 0) {
                activateBankruptcyMode();
                return;
            }

            leverActionTrigger.disabled = false;
        }

        function triggerFireworkBlast() {
            confetti({
                particleCount: 80,
                spread: 60,
                origin: { y: 0.6 },
                colors: ['#a855f7', '#ec4899', '#f59e0b', '#10b981']
            });
        }

        function triggerComboScreenFlash() {
            let end = Date.now() + (0.3 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function syncWalletUI() {
            document.getElementById('walletDisplay').innerText = walletBalance;
            
            // 잔액이 바뀌었을 때 현재 입력창의 금액이 잔액을 넘어가면 강제 보정
            const betInput = document.getElementById('betAmountField');
            let currentBet = parseInt(betInput.value) || 0;
            if (currentBet > walletBalance) {
                betInput.value = walletBalance;
            }
        }

        function refreshComboBadge() {
            const badge = document.getElementById('comboBadge');
            const countSpan = document.getElementById('comboCount');
            
            if (consecutiveStreak > 1) {
                badge.classList.remove('hidden');
                badge.classList.add('combo-active');
                countSpan.innerText = consecutiveStreak;
            } else {
                badge.classList.add('hidden');
                badge.classList.remove('combo-active');
            }
        }

        function activateBankruptcyMode() {
            document.getElementById('mainDashboard').classList.replace('block', 'hidden');
            document.getElementById('bankruptcyScreen').classList.remove('hidden');
            
            const indicator = document.getElementById('statusIndicator');
            indicator.className = "bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded";
            indicator.innerText = "파산";
        }

        function actionResetGame() {
            walletBalance = 100;
            consecutiveStreak = 0;
            syncWalletUI();
            refreshComboBadge();
            
            document.getElementById('betAmountField').value = "10";
            document.getElementById('mainDashboard').classList.replace('hidden', 'block');
            document.getElementById('bankruptcyScreen').classList.add('hidden');
            document.getElementById('payoutReportCard').classList.add('hidden');
            
            const trigger = document.getElementById('leverActionTrigger');
            trigger.disabled = false;

            const indicator = document.getElementById('statusIndicator');
            indicator.className = "bg-purple-950/40 text-purple-400 text-[10px] font-bold px-2 py-0.5 rounded border border-purple-900/40";
            indicator.innerText = "READY";
        }

        // 사용자가 직접 입력창에 숫자를 입력할 때 실시간 검증 및 최대치 클램핑(Clamp) 처리
        document.getElementById('betAmountField').addEventListener('input', function(e) {
            let value = parseInt(this.value) || 0;
            const errorPrompt = document.getElementById('errorPrompt');
            
            if (value > 100) {
                this.value = 100;
            }
            if (this.value > walletBalance) {
                this.value = walletBalance;
            }
            
            // 실시간 정상 범위 진입 시 에러 클래스 릴리즈
            if (this.value > 0 && this.value <= walletBalance) {
                errorPrompt.classList.add('hidden');
                this.classList.remove('border-red-500');
            }
        });
    </script>
</body>
</html>
